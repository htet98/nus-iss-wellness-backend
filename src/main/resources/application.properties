# ──────────────────────────────────────────
# Application
# ──────────────────────────────────────────
spring.application.name=wellness-backend
server.port=8080

# ──────────────────────────────────────────
# MySQL DataSource
# ──────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/wellness_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ──────────────────────────────────────────
# JPA / Hibernate
# ──────────────────────────────────────────
# ddl-auto=none — schema is managed by schema.sql
# Suppress harmless "table doesn't exist" WARNs during the DROP phase on a fresh DB
spring.jpa.properties.hibernate.hbm2ddl.halt_on_error=false
spring.jpa.hibernate.ddl-auto=none
# Forces Hibernate DDL to run before data.sql so tables exist when seed data runs
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ──────────────────────────────────────────
# SQL Initialisation (schema.sql + data.sql)
# ──────────────────────────────────────────
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.encoding=UTF-8
# Run SQL init before JPA so tables exist before Hibernate validates
spring.jpa.defer-datasource-initialization=true

# ──────────────────────────────────────────
# Jackson
# ──────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ──────────────────────────────────────────
# JWT
# ──────────────────────────────────────────
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
jwt.secret=myVeryLongSecretKey12345678901234567890
jwt.expiration-minutes=30
jwt.output-file=generated-jwts.txt
jwt.output-max-entries=5

# ──────────────────────────────────────────
# Python Semantic RAG AI Service
# ──────────────────────────────────────────
ai.python-service.base-url=http://localhost:8000
ai.python-service.connect-timeout-seconds=5
ai.python-service.read-timeout-seconds=60


# ──────────────────────────────────────────
# Logging
# ──────────────────────────────────────────
logging.level.nus.iss.wellness=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
